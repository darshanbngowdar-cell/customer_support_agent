services:
  support-agent:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./docs:/app/docs
    command: support-agent

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./docs:/app/docs
    command: streamlit run src/support_agent/presentation/streamlit_app.py --server.address=0.0.0.0
